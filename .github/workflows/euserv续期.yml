name: EUserv 续期

on:
  schedule:
    - cron: '27 0 15 8 *'  # 这里的日期会被 Python 脚本自动修改
  workflow_dispatch:  # 允许手动触发工作流

jobs:
  renew:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run EUserv renew script
        env:
          EUSERV_EMAIL: ${{ secrets.EUSERV_EMAIL }}
          EUSERV_PASSWORD: ${{ secrets.EUSERV_PASSWORD }}
          EUSERV_2FA: ${{ secrets.EUSERV_2FA }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          SKIP_CONTRACTS: ${{ secrets.SKIP_CONTRACTS }}
          DEBUG: ${{ secrets.DEBUG }}
          PAT_WITH_WORKFLOW_SCOPE: ${{ secrets.PAT_WITH_WORKFLOW_SCOPE }}
          GITHUB_REPO: ${{ github.repository }}
        run: python euser_renew0.py
